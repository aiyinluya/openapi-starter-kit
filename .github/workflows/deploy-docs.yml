name: Deploy Documentation to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - 'docs/**'
      - 'README.md'
      - 'examples/**'
      - '.github/workflows/deploy-docs.yml'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install marked
        run: npm install -g marked

      - name: Build Documentation Site
        run: |
          mkdir -p _site
          
          # 创建主页面
          cat > _site/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="zh-CN">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>OpenAPI Starter Kit - 教程</title>
            <style>
              * { margin: 0; padding: 0; box-sizing: border-box; }
              body {
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
                line-height: 1.6;
                color: #333;
                background: #f5f5f5;
              }
              .container {
                max-width: 1200px;
                margin: 0 auto;
                display: flex;
                min-height: 100vh;
              }
              .sidebar {
                width: 280px;
                background: #fff;
                border-right: 1px solid #e0e0e0;
                padding: 20px;
                position: fixed;
                height: 100vh;
                overflow-y: auto;
              }
              .sidebar h1 {
                font-size: 1.5rem;
                margin-bottom: 10px;
                color: #1976d2;
              }
              .sidebar .subtitle {
                font-size: 0.9rem;
                color: #666;
                margin-bottom: 20px;
              }
              .nav-section {
                margin-bottom: 20px;
              }
              .nav-section h3 {
                font-size: 0.85rem;
                text-transform: uppercase;
                color: #999;
                margin-bottom: 10px;
                letter-spacing: 0.5px;
              }
              .nav-section a {
                display: block;
                padding: 8px 12px;
                color: #333;
                text-decoration: none;
                border-radius: 4px;
                margin-bottom: 4px;
                font-size: 0.95rem;
              }
              .nav-section a:hover {
                background: #f0f0f0;
              }
              .nav-section a.active {
                background: #e3f2fd;
                color: #1976d2;
              }
              .main-content {
                flex: 1;
                margin-left: 280px;
                padding: 40px;
                background: #fff;
                min-height: 100vh;
              }
              .main-content h1 {
                font-size: 2.5rem;
                margin-bottom: 20px;
                color: #1976d2;
                border-bottom: 3px solid #1976d2;
                padding-bottom: 10px;
              }
              .main-content h2 {
                font-size: 1.8rem;
                margin: 30px 0 15px;
                color: #333;
              }
              .main-content h3 {
                font-size: 1.4rem;
                margin: 25px 0 10px;
                color: #444;
              }
              .main-content p {
                margin-bottom: 15px;
                line-height: 1.8;
              }
              .main-content code {
                background: #f4f4f4;
                padding: 2px 6px;
                border-radius: 3px;
                font-family: 'Consolas', 'Monaco', monospace;
                font-size: 0.9em;
              }
              .main-content pre {
                background: #263238;
                color: #aed581;
                padding: 20px;
                border-radius: 8px;
                overflow-x: auto;
                margin: 20px 0;
              }
              .main-content pre code {
                background: transparent;
                color: inherit;
                padding: 0;
              }
              .main-content ul, .main-content ol {
                margin: 15px 0;
                padding-left: 30px;
              }
              .main-content li {
                margin-bottom: 8px;
              }
              .main-content table {
                width: 100%;
                border-collapse: collapse;
                margin: 20px 0;
              }
              .main-content th, .main-content td {
                border: 1px solid #ddd;
                padding: 12px;
                text-align: left;
              }
              .main-content th {
                background: #f5f5f5;
                font-weight: 600;
              }
              .main-content blockquote {
                border-left: 4px solid #1976d2;
                padding-left: 20px;
                margin: 20px 0;
                color: #666;
              }
              .main-content a {
                color: #1976d2;
              }
              .main-content a:hover {
                text-decoration: underline;
              }
              .badge {
                display: inline-block;
                padding: 4px 12px;
                border-radius: 20px;
                font-size: 0.85rem;
                font-weight: 500;
                margin-right: 8px;
              }
              .badge-primary {
                background: #e3f2fd;
                color: #1976d2;
              }
              .badge-success {
                background: #e8f5e9;
                color: #388e3c;
              }
              .badge-warning {
                background: #fff3e0;
                color: #f57c00;
              }
              .hero {
                background: linear-gradient(135deg, #1976d2 0%, #1565c0 100%);
                color: white;
                padding: 60px 40px;
                margin: -40px -40px 40px -40px;
                text-align: center;
              }
              .hero h1 {
                color: white;
                border: none;
                font-size: 3rem;
                margin-bottom: 20px;
              }
              .hero p {
                font-size: 1.3rem;
                opacity: 0.9;
                max-width: 600px;
                margin: 0 auto;
              }
              .cta-button {
                display: inline-block;
                background: white;
                color: #1976d2;
                padding: 15px 30px;
                border-radius: 30px;
                text-decoration: none;
                font-weight: 600;
                margin-top: 30px;
                transition: transform 0.2s;
              }
              .cta-button:hover {
                transform: translateY(-2px);
                text-decoration: none;
              }
              .feature-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
                gap: 20px;
                margin: 40px 0;
              }
              .feature-card {
                background: #f8f9fa;
                padding: 25px;
                border-radius: 12px;
                border-left: 4px solid #1976d2;
              }
              .feature-card h3 {
                margin-top: 0;
                color: #1976d2;
              }
              @media (max-width: 768px) {
                .sidebar {
                  display: none;
                }
                .main-content {
                  margin-left: 0;
                  padding: 20px;
                }
              }
            </style>
          </head>
          <body>
            <div class="container">
              <nav class="sidebar">
                <h1>📘 OpenAPI 教程</h1>
                <p class="subtitle">从零开始学习 API 规范设计</p>
                
                <div class="nav-section">
                  <h3>快速开始</h3>
                  <a href="#intro" class="active">介绍</a>
                  <a href="swagger/">Swagger UI 演示</a>
                </div>
                
                <div class="nav-section">
                  <h3>教程章节</h3>
                  <a href="01-basics.html">01. 基础概念</a>
                  <a href="02-hello-world.html">02. Hello World</a>
                  <a href="03-paths.html">03. 路径与操作</a>
                  <a href="04-schemas.html">04. 数据模型</a>
                  <a href="05-requests.html">05. 请求响应</a>
                  <a href="06-auth.html">06. 认证授权</a>
                  <a href="07-full-example.html">07. 完整案例</a>
                  <a href="08-codegen.html">08. 代码生成</a>
                  <a href="09-testing.html">09. 测试与 Mock</a>
                  <a href="10-best-practices.html">10. 最佳实践</a>
                </div>
                
                <div class="nav-section">
                  <h3>资源</h3>
                  <a href="https://github.com/aiyinluya/openapi-starter-kit" target="_blank">GitHub 仓库</a>
                  <a href="https://spec.openapis.org/" target="_blank">OpenAPI 官方规范</a>
                </div>
              </nav>
              
              <main class="main-content">
                <div class="hero">
                  <h1>OpenAPI Starter Kit</h1>
                  <p>从零开始学习 OpenAPI 3.0，掌握 RESTful API 设计规范。通过实战项目，学会编写专业的 API 文档。</p>
                  <a href="01-basics.html" class="cta-button">开始学习 →</a>
                </div>
                
                <h2>📚 你将学到什么</h2>
                
                <div class="feature-grid">
                  <div class="feature-card">
                    <h3>🎯 核心概念</h3>
                    <p>理解 OpenAPI 规范的核心概念，包括路径、操作、参数、响应等基础知识。</p>
                  </div>
                  <div class="feature-card">
                    <h3>📝 规范编写</h3>
                    <p>学会使用 YAML 编写规范的 API 文档，掌握各种数据类型和验证规则。</p>
                  </div>
                  <div class="feature-card">
                    <h3>🔧 工具链</h3>
                    <p>使用 Swagger UI、Prism、OpenAPI Generator 等专业工具提升效率。</p>
                  </div>
                  <div class="feature-card">
                    <h3>🚀 最佳实践</h3>
                    <p>掌握 API 版本管理、认证授权、错误处理等生产环境必备技能。</p>
                  </div>
                </div>
                
                <h2>🛠️ 前置要求</h2>
                <ul>
                  <li>基础的 HTTP 和 RESTful API 知识</li>
                  <li>了解 YAML 或 JSON 格式</li>
                  <li>一台能上网的电脑</li>
                </ul>
                
                <h2>📖 教程结构</h2>
                <table>
                  <tr>
                    <th>章节</th>
                    <th>内容</th>
                    <th>难度</th>
                  </tr>
                  <tr>
                    <td>01. 基础概念</td>
                    <td>什么是 OpenAPI，为什么需要它</td>
                    <td><span class="badge badge-success">入门</span></td>
                  </tr>
                  <tr>
                    <td>02-06. 基础语法</td>
                    <td>路径、参数、模型、响应、认证</td>
                    <td><span class="badge badge-primary">基础</span></td>
                  </tr>
                  <tr>
                    <td>07. 完整案例</td>
                    <td>宠物商店 API 实战</td>
                    <td><span class="badge badge-warning">进阶</span></td>
                  </tr>
                  <tr>
                    <td>08-10. 高级主题</td>
                    <td>代码生成、测试、最佳实践</td>
                    <td><span class="badge badge-warning">进阶</span></td>
                  </tr>
                </table>
                
                <h2>🌟 特色</h2>
                <ul>
                  <li><strong>循序渐进</strong> - 从 Hello World 到完整项目，逐步深入</li>
                  <li><strong>实战导向</strong> - 每个概念都有对应的代码示例</li>
                  <li><strong>中文教程</strong> - 全中文讲解，降低学习门槛</li>
                  <li><strong>开源免费</strong> - MIT 协议，可自由使用和修改</li>
                </ul>
                
                <h2>🚀 开始学习</h2>
                <p>点击左侧菜单的 <strong>"01. 基础概念"</strong>，或者上方的 <strong>"开始学习"</strong> 按钮，开启你的 OpenAPI 学习之旅！</p>
                
                <hr style="margin: 40px 0;">
                <p style="text-align: center; color: #999;">
                  Made with ❤️ | 
                  <a href="https://github.com/aiyinluya/openapi-starter-kit">GitHub</a> | 
                  <a href="swagger/">Swagger UI 演示</a>
                </p>
              </main>
            </div>
          </body>
          </html>
          EOF
          
          # 转换 Markdown 为 HTML
          for file in docs/*.md; do
            filename=$(basename "$file" .md)
            echo "Converting $file to $filename.html"
            marked -i "$file" -o "_site/$filename.html"
          done
          
          # 复制示例文件
          mkdir -p _site/examples
          cp examples/*.yaml _site/examples/
          
          # 复制 OpenAPI 文件到 swagger 目录
          mkdir -p _site/swagger
          cp openapi.yaml _site/swagger/
          cp openapi.json _site/swagger/
          
          # 创建 Swagger UI 页面
          cat > _site/swagger/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="zh-CN">
          <head>
            <meta charset="UTF-8">
            <title>Pet Store API - Swagger UI</title>
            <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5.10.3/swagger-ui.css" />
            <style>
              html { box-sizing: border-box; overflow: -moz-scrollbars-vertical; overflow-y: scroll; }
              *, *:before, *:after { box-sizing: inherit; }
              body { margin: 0; background: #fafafa; }
              .topbar { display: none; }
            </style>
          </head>
          <body>
            <div id="swagger-ui"></div>
            <script src="https://unpkg.com/swagger-ui-dist@5.10.3/swagger-ui-bundle.js"></script>
            <script src="https://unpkg.com/swagger-ui-dist@5.10.3/swagger-ui-standalone-preset.js"></script>
            <script>
              window.onload = function() {
                window.ui = SwaggerUIBundle({
                  url: 'openapi.yaml',
                  dom_id: '#swagger-ui',
                  deepLinking: true,
                  presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
                  plugins: [SwaggerUIBundle.plugins.DownloadUrl],
                  layout: "StandaloneLayout",
                  validatorUrl: null,
                  tryItOutEnabled: true
                });
              };
            </script>
          </body>
          </html>
          EOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
