openapi: 3.0.3
info:
  title: Schemas Demo
  version: 1.0.0
  description: 演示数据模型（Schema）定义

paths:
  /pets:
    get:
      summary: 获取宠物
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Pet'

components:
  schemas:
    # 基础类型
    Pet:
      type: object
      description: 宠物信息
      required:
        - id
        - name
      properties:
        id:
          type: integer
          format: int64
          readOnly: true
          description: 唯一标识
        name:
          type: string
          description: 宠物名称
          minLength: 1
          maxLength: 50
        age:
          type: integer
          description: 年龄（月）
          minimum: 0
          maximum: 360
        weight:
          type: number
          format: float
          description: 体重（kg）
          minimum: 0
        isVaccinated:
          type: boolean
          description: 是否已接种疫苗
          default: false
        birthDate:
          type: string
          format: date
          description: 出生日期
        createdAt:
          type: string
          format: date-time
          description: 创建时间
        photoUrl:
          type: string
          format: uri
          description: 照片 URL
        status:
          type: string
          description: 状态
          enum:
            - available
            - pending
            - sold
        category:
          $ref: '#/components/schemas/Category'
        tags:
          type: array
          description: 标签列表
          items:
            $ref: '#/components/schemas/Tag'
        metadata:
          type: object
          description: 额外元数据
          additionalProperties:
            type: string

    Category:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
          enum:
            - 猫
            - 狗
            - 鸟
            - 鱼
            - 其他

    Tag:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string

    # 数组类型
    PetList:
      type: array
      items:
        $ref: '#/components/schemas/Pet'

    # 组合类型
    Error:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        details:
          type: array
          items:
            type: string
